# Markdown Lint Configuration for flow-cli
# https://github.com/DavidAnson/markdownlint/blob/main/doc/Rules.md

# Default state for all rules
default: true

# MD003: Heading style
MD003:
  style: 'atx' # Use ### style, not underline style

# MD004: Unordered list style
MD004:
  style: 'dash' # Use - for lists, not * or +

# MD007: Unordered list indentation
MD007:
  indent: 2 # 2 spaces per indent level
  start_indented: false

# MD010: No hard tabs
MD010:
  code_blocks: false # Allow tabs in code blocks only

# MD012: Multiple consecutive blank lines
MD012:
  maximum: 2 # Allow up to 2 blank lines

# MD022: Headings should be surrounded by blank lines
MD022:
  lines_above: 1
  lines_below: 1

# MD024: Multiple headings with the same content
MD024:
  siblings_only: true # Allow same heading in different sections

# MD026: Trailing punctuation in heading
MD026:
  punctuation: '.,;:!' # Don't allow these at end of headings

# MD029: Ordered list item prefix
MD029:
  style: 'ordered' # Use 1. 2. 3., not 1. 1. 1.

# MD040: Fenced code blocks should have a language specified
MD040:
  allowed_languages: []
  language_only: false

# MD048: Code fence style
MD048:
  style: 'backtick' # Use ```, not ~~~

# MD049: Emphasis style
MD049:
  style: 'asterisk' # Use *italic* and **bold**

# MD050: Strong style
MD050:
  style: 'asterisk' # Use **bold**, not __bold__

# Disabled rules
MD001: false # Heading levels - we skip levels in docs
MD005: false # List indentation - allow flexibility
MD013: false # Line length - docs have long tables, URLs, code examples
MD014: false # Dollar signs before commands - we show shell prompts
MD025: false # Multiple top-level headings - common in project docs
MD028: false # Blank line inside blockquote - allow for readability
MD030: false # Spaces after list markers - allow flexibility
MD032: false # Lists surrounded by blank lines - allow flexibility
MD033: false # Inline HTML - too many false positives from <placeholder> syntax
MD034: false # Bare URLs - allow bare URLs
MD036: false # Emphasis as heading - intentional in flow-cli docs
MD041: false # First line heading - frontmatter and non-heading first lines
MD042: false # Empty links - sometimes used as placeholders
MD046: false # Code block style - conflicts with MkDocs admonitions/tabs indentation
MD051: false # Link fragments - too strict for cross-referenced docs
MD055: false # Table pipe style - allow flexibility
MD056: false # Table column count - allow flexibility
MD058: false # Tables surrounded by blank lines - allow flexibility
MD060: false # Table column style - overly strict pipe spacing
