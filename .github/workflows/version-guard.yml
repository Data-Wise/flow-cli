name: Version Guard

on:
  release:
    types: [created]

concurrency:
  group: version-guard
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  check-version:
    name: Verify FLOW_VERSION matches tag
    runs-on: ubuntu-latest

    steps:
      - name: Checkout tag
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.release.tag_name }}

      - name: Extract and compare versions
        env:
          TAG_NAME: ${{ github.event.release.tag_name }}
        run: |
          TAG_VERSION="${TAG_NAME#v}"
          FLOW_VERSION=$(grep -oE 'FLOW_VERSION="?[0-9]+\.[0-9]+\.[0-9]+' flow.plugin.zsh | grep -oE '[0-9]+\.[0-9]+\.[0-9]+')

          echo "Tag version: $TAG_VERSION"
          echo "FLOW_VERSION: $FLOW_VERSION"

          if [ "$TAG_VERSION" != "$FLOW_VERSION" ]; then
            echo "::error::Version mismatch! Tag=$TAG_VERSION but FLOW_VERSION=$FLOW_VERSION"
            echo ""
            echo "To fix: update FLOW_VERSION in flow.plugin.zsh to match the tag, then re-release."
            exit 1
          fi

          echo "Version match confirmed: $TAG_VERSION"
