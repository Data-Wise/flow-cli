name: CI Tests

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  zsh-tests:
    name: ZSH Plugin Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Ensure zsh is installed
        run: |
          # zsh is preinstalled on ubuntu-latest; install only as a fallback.
          # Replaces awalsh128/cache-apt-pkgs-action (pulled in deprecated
          # Node.js 20 actions/cache/restore@v4) for a tiny preinstalled package.
          if ! command -v zsh >/dev/null 2>&1; then
            sudo apt-get update && sudo apt-get install -y zsh
          fi

      - name: Record start time
        id: start
        run: echo "time=$(date +%s)" >> $GITHUB_OUTPUT

      - name: Create mock project structure
        run: |
          mkdir -p ~/projects/dev-tools/flow-cli/.git
          mkdir -p ~/projects/r-packages/active/mediationverse/.git
          mkdir -p ~/projects/r-packages/stable/rmediation/.git
          mkdir -p ~/projects/teaching/stat-440/.git
          mkdir -p ~/projects/research/mediation-planning/.git
          mkdir -p ~/projects/quarto/manuscripts/paper1/.git
          mkdir -p ~/projects/apps/examify/.git
          cp -r . ~/projects/dev-tools/flow-cli/

      - name: Run smoke tests
        run: |
          cd ~/projects/dev-tools/flow-cli
          # Smoke tests only - run full suite locally with: ./tests/run-all.sh
          zsh ./tests/test-flow.zsh
          bash ./tests/test-install.sh

      - name: Man-page version-sync guard
        run: |
          cd ~/projects/dev-tools/flow-cli
          # Anti-drift: fail if any flow-cli man page .TH version != FLOW_VERSION
          zsh ./tests/test-manpage-version-sync.zsh

      - name: Performance Summary
        if: always()
        run: |
          END_TIME=$(date +%s)
          DURATION=$((END_TIME - ${{ steps.start.outputs.time }}))
          echo "## 📊 ZSH Tests Performance" >> $GITHUB_STEP_SUMMARY
          echo "| Metric | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Duration | ${DURATION}s |" >> $GITHUB_STEP_SUMMARY

  # ---------------------------------------------------------------------------
  # TEMPORARY (ci-full-suite-gate Phase 2): teach-deploy suites still fail on CI
  # with the yq guard, so yq must be PRESENT and the cause is elsewhere. Capture
  # the real runner output + environment fingerprint. DELETE.
  # ---------------------------------------------------------------------------
  diag-undiagnosed:
    name: Diagnose teach-deploy (temporary)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      - name: Ensure zsh
        run: command -v zsh >/dev/null 2>&1 || { sudo apt-get update && sudo apt-get install -y zsh; }
      - name: Configure git identity
        run: |
          git config --global user.email "ci@flow-cli.test"
          git config --global user.name "flow-cli CI"
          git config --global init.defaultBranch main
      - name: Environment fingerprint
        run: |
          echo "yq: $(command -v yq || echo MISSING) | $(yq --version 2>&1 | head -1)"
          echo "git user.name=[$(git config --global user.name)] user.email=[$(git config --global user.email)]"
          echo "R: $(command -v R || echo MISSING) | quarto: $(command -v quarto || echo MISSING) | rsync: $(command -v rsync || echo MISSING)"
      - name: Create mock project structure
        run: |
          mkdir -p ~/projects/dev-tools/flow-cli/.git
          mkdir -p ~/projects/teaching/stat-440/.git
          cp -r . ~/projects/dev-tools/flow-cli/
      - name: stat probe (why em-cache fails on Linux)
        if: always()
        run: |
          f=$(mktemp); echo hi > "$f"
          echo "stat -f %m  => [$(stat -f %m "$f" 2>&1)] rc=$?"
          echo "stat -c %Y  => [$(stat -c %Y "$f" 2>&1)] rc=$?"
          echo "md5         => [$(echo x | md5 2>&1 | head -1)]"
          echo "md5sum      => [$(echo x | md5sum 2>&1 | head -1)]"
      - name: test-em-dispatcher
        if: always()
        run: cd ~/projects/dev-tools/flow-cli && timeout 60 zsh ./tests/test-em-dispatcher.zsh
      - name: dogfood-em-dispatcher
        if: always()
        run: cd ~/projects/dev-tools/flow-cli && timeout 60 zsh ./tests/dogfood-em-dispatcher.zsh

  # ---------------------------------------------------------------------------
  # Phase 1 (ci-full-suite-gate): MEASURE the full 65-suite run-all.sh in CI.
  # Non-blocking on purpose (continue-on-error) — this job exists to capture the
  # ground-truth pass/skip/fail list on a hosted runner (no atlas, no IMAP)
  # before we make it a required gate (Phase 3). Do NOT add to required checks
  # while this comment is here.
  # ---------------------------------------------------------------------------
  full-suite:
    name: Full Test Suite (non-blocking)
    runs-on: ubuntu-latest
    continue-on-error: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Ensure zsh is installed
        run: |
          if ! command -v zsh >/dev/null 2>&1; then
            sudo apt-get update && sudo apt-get install -y zsh
          fi

      - name: Configure git identity
        run: |
          # Fresh runners have no git identity; suites that exercise the deploy
          # workflow (teach-deploy) run `git commit` and fail with "empty ident"
          # without it. This is CI environment provisioning, not a test change.
          git config --global user.email "ci@flow-cli.test"
          git config --global user.name "flow-cli CI"
          git config --global init.defaultBranch main

      - name: Record start time
        id: start
        run: echo "time=$(date +%s)" >> $GITHUB_OUTPUT

      - name: Create mock project structure
        run: |
          mkdir -p ~/projects/dev-tools/flow-cli/.git
          mkdir -p ~/projects/r-packages/active/mediationverse/.git
          mkdir -p ~/projects/r-packages/stable/rmediation/.git
          mkdir -p ~/projects/teaching/stat-440/.git
          mkdir -p ~/projects/research/mediation-planning/.git
          mkdir -p ~/projects/quarto/manuscripts/paper1/.git
          mkdir -p ~/projects/apps/examify/.git
          cp -r . ~/projects/dev-tools/flow-cli/

      - name: Run full suite (non-blocking)
        id: fullsuite
        run: |
          cd ~/projects/dev-tools/flow-cli
          set +e
          # Capture run-all.sh output; tee returns 0, so grab run-all's real
          # exit via PIPESTATUS (1=FAIL, 2=TIMEOUT, 0=clean) and re-exit with it
          # so the job color reflects reality. continue-on-error keeps it from
          # blocking the PR.
          ./tests/run-all.sh 2>&1 | tee /tmp/full-suite.log
          rc=${PIPESTATUS[0]}
          echo "rc=$rc" >> "$GITHUB_OUTPUT"
          echo "Full suite exit code: $rc"
          exit "$rc"

      - name: Full Suite Summary
        if: always()
        run: |
          END_TIME=$(date +%s)
          DURATION=$((END_TIME - ${{ steps.start.outputs.time }}))
          {
            echo "## 🧪 Full Suite (run-all.sh) — non-blocking measurement"
            echo ""
            echo "| Metric | Value |"
            echo "|--------|-------|"
            echo "| Duration | ${DURATION}s |"
            echo "| Exit code | \`${{ steps.fullsuite.outputs.rc }}\` (0=clean, 1=FAIL, 2=TIMEOUT) |"
            echo ""
            echo "<details><summary>Full run-all.sh output</summary>"
            echo ""
            echo '```'
            cat /tmp/full-suite.log 2>/dev/null || echo "(no log captured)"
            echo '```'
            echo ""
            echo "</details>"
          } >> "$GITHUB_STEP_SUMMARY"
